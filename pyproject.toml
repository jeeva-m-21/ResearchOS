[tool.uv.workspace]
members = ["apps/api", "packages/sdk"]

[tool.uv]
dev-dependencies = [
    "ruff>=0.6",
    "mypy>=1.11",
    "pytest>=8",
]

[tool.ruff]
line-length = 100
target-version = "py311"
[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
strict = true

[[tool.mypy.overrides]]
module = [
    "fastapi",
    "fastapi.testclient",
    "httpx",
    "pydantic_settings",
    "starlette.testclient",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
addopts = "-q"
